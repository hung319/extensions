# Tăng RAM cho Gradle nhưng để lại khoảng trống cho Hệ điều hành của Github Action
org.gradle.jvmargs=-Xmx3072m -Dfile.encoding=UTF-8 -XX:MaxMetaspaceSize=512m
org.gradle.parallel=true

# Cấu hình AndroidX
android.useAndroidX=true
android.enableJetifier=true
android.buildFeatures.buildConfig=true

# Tắt tính năng compile dồn tích để tránh lỗi cache metadata hỏng
kotlin.incremental=false

# Giảm mức độ log của Kotlin Compiler
kotlin.colors.enabled=false
# Tắt thông báo chi tiết về các tác vụ chạy ngầm
org.gradle.logging.level=quiet
